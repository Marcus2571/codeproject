* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
        
body {
  background-color: #3d3d3d;
  height: 850px;
}
      
#navbar {
  background-color: #3d3d3d;
  /* overflow: hidden; */
  /* position: fixed; */
  top: 0%;
  width: 100%;
  box-shadow: 0px 5px 50px #000;
  margin-bottom: 2%;
}
        
div a {
  text-decoration: none;
  color: white;
  font-size: 20px;
  padding: 15px;
  display: inline-block;
}
        
ul {
  display: inline;
  margin: 0;
  padding: 0;
}
        
#navbar ul li {display: inline-block;}
  
#navbar ul li:hover {background: #555;}
  
#navbar ul li:hover ul {display: block;}
  
#navbar ul li ul {
  position: absolute;
  width: 200px;
  display: none;
  z-index: 4;
}
  
#navbar ul li ul li { 
  background: #555; 
  display: block; 
}
  
#navbar ul li ul li a {display:block !important;} 
  
#navbar ul li ul li:hover {background: #666;}

.userform {
  float: right;
}
  
.loginbutton {
  width: 75px;
  height: 30px;
  margin: 10px 5px 5px 5px;
  box-shadow: 0 2px 10px #000;
  cursor: pointer;
}
  
 ul input:hover {
  background-color: #f3f3f3bb;  
}

/* Dropdown Button */
.languagebtn {
  background-color: #3d3d3d;
  color: white;
  padding: 16px;
  font-size: 18px;
  border: none;
}
  
/* The container <div> - needed to position the dropdown content */
.languagepicker {
  position: relative;
  display: inline-block;
}
  
/* Dropdown Content (Hidden by Default) */
.languagepicker-content {
  display: none;
  position: absolute;
  background-color: #f1f1f1;
  width: 100px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  z-index: 1;
}
  
/* Links inside the dropdown */
.languagepicker-content a {
  color: black;
  padding: 12px 16px;
  text-decoration: none;
  display: inline-block;
}
  
/* Change color of dropdown links on hover */
.languagepicker-content a:hover {background-color: #ddd;}
  
/* Show the dropdown menu on hover */
.languagepicker:hover .languagepicker-content {display: block;}
  
/* Change the background color of the dropdown button when the dropdown content is shown */
.languagepicker:hover .languagebtn {background-color: #555;}

.languageflags {
  width: 100%;
  height: 100%;
}
