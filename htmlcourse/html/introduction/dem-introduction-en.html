       &lt;h2&gt;Introduction to HTML&lt;/h2&gt;
       &lt;br&gt;
       &lt;div class="text-content"&gt;
         &lt;p&gt;Welcome to the world of code! Last year, millions of learners from our community started with HTML. Why? HTML is the skeleton of all web pages.
           It’s often the first language learned by developers, marketers, and designers and is core to front-end development work. If this is your first time touching code, 
           we’re excited for what you’re about to create.
           &lt;br&gt;&lt;br&gt;
           So what exactly is HTML? HTML provides structure to the content appearing on a website, such as images, text, or videos. Right-click on any page on the internet, 
           choose “Inspect,” and you’ll see HTML in a panel of your screen.
           &lt;br&gt;&lt;br&gt;
           HTML stands for HyperText Markup Language:
           &lt;br&gt;&lt;br&gt;
           &lt;ul&gt;
             &lt;li&gt;A markup language is a computer language that defines the structure and presentation of raw text.&lt;/li&gt;&lt;br&gt;
             &lt;li&gt;In HTML, the computer can interpret raw text that is wrapped in HTML elements.&lt;/li&gt;&lt;br&gt;
             &lt;li&gt;HyperText is text displayed on a computer or device that provides access to other text through links, also known as hyperlinks. You probably clicked on a couple of 
              hyperlinks on your way to this codeproject course.&lt;/li&gt;&lt;br&gt;&lt;br&gt;
           &lt;/ul&gt;
           Learning HTML is the first step in creating websites, but even a bit of knowledge can help you inject code snippets into newsletter, blog or website templates. 
          As you continue learning, you can layer HTML with CSS and JavaScript to create visually compelling and dynamic websites. But for now, we’re going to focus on how to 
          add and modify basic content on a page, like text, images, and videos. Don’t worry if the websites look ugly — we’re just getting started.&lt;/p&gt;

input[type=checkbox] {

input[type=checkbox]:before {
    content: "";
    display: block;
    position: absolute;
    width: 16px;
    height: 16px;
    top: 0;
    left: 0;
    border: 2px solid #555555;
    border-radius: 3px;
    background-color: white;
}

input[type=checkbox]:checked:after {
    content: "";
    display: block;
    width: 5px;
    height: 10px;
    border: solid black;
    border-width: 0 2px 2px 0;
    -webkit-transform: rotate(45deg);
    -ms-transform: rotate(45deg);
    transform: rotate(45deg);
    position: absolute;
    top: 2px;
    left: 6px;
}
